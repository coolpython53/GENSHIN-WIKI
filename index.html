<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Static Wiki Engine</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0b0f1a; color:white; }
#layout { display:flex; height:100vh; }

#sidebar {
  width:300px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#0f172a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

.item {
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  cursor:pointer;
  border-radius:6px;
}

.item:hover { background:#1f2937; }

.folder { font-weight:bold; }
.indent { margin-left:16px; }

img.icon {
  width:18px;
  height:18px;
  border-radius:4px;
}

#content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

img { max-width:100%; border-radius:10px; }
audio { width:100%; }

a { color:#60a5fa; cursor:pointer; }

ul { padding-left:20px; }
li { margin:4px 0; cursor:pointer; }
li:hover { text-decoration:underline; }

/* TOGGLE */
#kindleToggleWrap{
  position:fixed;
  top:10px;
  right:15px;
  z-index:999;
  background:#1f2937;
  padding:6px 10px;
  border-radius:8px;
  font-size:14px;
}

/* KINDLE MODE */
body.kindle {
  background:white;
  color:black;
  font-size:200%;
}

body.kindle #sidebar {
  display:none;
}

body.kindle #content {
  background:white;
  color:black;
  line-height:1.8;
  max-width:800px;
  margin:auto;
}

body.kindle a { color:#1a0dab; }

body.kindle img.icon { display:none; }

body.kindle #backBtn {
  display:block;
  margin-bottom:15px;
  padding:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="kindleToggleWrap">
  <label>
    <input type="checkbox" id="kindleToggle" onchange="toggleKindle()">
    Kindle Mode
  </label>
</div>

<div id="layout">
  <div id="sidebar">
    <input id="search" placeholder="Search..." oninput="renderTree()" />
    <div id="tree"></div>
  </div>

  <div id="content">
    <button id="backBtn" onclick="renderTree()" style="display:none;">⬅ Back</button>
    <h2 id="title">Wiki</h2>
    <div id="page">Select a page</div>
  </div>
</div>

<script>

const BASE_URL = "https://coolpython53.github.io/GENSHIN-WIKI/";
const FALLBACK_ICON = BASE_URL + "blueprint.jpg";
const ICON_EXTENSIONS = ["jpg","png","jpeg"];

let pages = [];
let imageStore = [];
let kindleMode = false;

/* ---------------- KINDLE ---------------- */

function toggleKindle(){
  kindleMode = document.getElementById("kindleToggle").checked;
  document.body.classList.toggle("kindle", kindleMode);

  document.getElementById("backBtn").style.display = kindleMode ? "block" : "none";
}

/* ---------------- LOAD ---------------- */

async function loadPages(){
  try {
    const res = await fetch(BASE_URL + "manifest.json?t=" + Date.now());
    pages = await res.json();
  } catch {
    pages = [];
  }
  renderTree();
}

/* ---------------- TREE ---------------- */

function buildTree(paths){
  const root = {};
  paths.forEach(path=>{
    const parts = path.split("/");
    let cur = root;
    parts.forEach((p,i)=>{
      if(!cur[p]) cur[p] = {__children:{}, __path: parts.slice(0,i+1).join("/")};
      cur = cur[p].__children;
    });
  });
  return root;
}

function renderTree(){
  const q = search.value.toLowerCase();
  tree.innerHTML = "";
  const filtered = pages.filter(p => p.toLowerCase().includes(q));
  renderNode(buildTree(filtered), tree);
}

/* ---------------- ICON ---------------- */

async function getIcon(path){
  for(const ext of ICON_EXTENSIONS){
    const url = `${BASE_URL}pages/${path}/blueprint.${ext}`;
    try {
      const res = await fetch(url, {method:'HEAD'});
      if(res.ok) return url;
    } catch {}
  }
  return FALLBACK_ICON;
}

function renderNode(node, container, depth=0){
  Object.keys(node).forEach(async key=>{
    const item = node[key];
    const fullPath = item.__path;
    const hasChildren = Object.keys(item.__children).length > 0;

    const div = document.createElement("div");
    div.className = "item indent";
    div.style.marginLeft = depth * 16 + "px";

    const icon = await getIcon(fullPath);

    div.innerHTML = `
      <img class="icon" src="${icon}" onerror="this.src='${FALLBACK_ICON}'">
      <span class="${hasChildren?'folder':''}">${key.replace(/_/g,' ')}</span>
    `;

    div.onclick = () => hasChildren ? loadFolder(fullPath) : loadPage(fullPath);

    container.appendChild(div);
  });
}

/* ---------------- ROUTER ---------------- */

function openWikiPath(rawPath){
  let path = rawPath
    .replace(/^GENSHIN-WIKI\/pages\//, "")
    .replace(/^pages\//, "");

  const isFolder = path.includes("folder.md");
  const isPage = path.includes("page.md");

  path = path
    .replace(/\/folder\.md$/, "")
    .replace(/\/page\.md$/, "")
    .replace(/\/$/, "");

  if(isFolder) return loadFolder(path);
  if(isPage) return loadPage(path);

  loadPage(path);
}

/* ---------------- PAGE ---------------- */

async function loadPage(fullPath){
  title.innerText = fullPath.split("/").pop().replace(/_/g,' ');
  page.innerHTML = "Loading...";

  const url = `${BASE_URL}pages/${fullPath}/page.md`;

  try{
    const res = await fetch(url);
    if(!res.ok) return page.innerHTML = "📁 Folder";

    let text = await res.text();

    text = convertAssets(fullPath, text);
    text = convertPageLinks(text);

    page.innerHTML = marked.parse(text);

    restoreImages();

  } catch {
    page.innerHTML = "📁 Folder";
  }
}

/* ---------------- FOLDER ---------------- */

async function loadFolder(fullPath){
  title.innerText = fullPath.split("/").pop().replace(/_/g,' ');
  page.innerHTML = "";

  const url = `${BASE_URL}pages/${fullPath}/folder.md`;

  try{
    const res = await fetch(url);
    if(res.ok){
      let text = await res.text();

      text = convertAssets(fullPath,text);
      text = convertPageLinks(text);

      const div = document.createElement("div");
      div.innerHTML = marked.parse(text);
      page.appendChild(div);
    }
  } catch {}

  const children = pages.filter(p => p.startsWith(fullPath) && p !== fullPath);

  const ul = document.createElement("ul");
  children.forEach(c=>{
    const li = document.createElement("li");
    li.innerText = c.split("/").pop().replace(/_/g,' ');
    li.onclick = ()=>loadPage(c);
    ul.appendChild(li);
  });

  page.appendChild(ul);
}

/* ---------------- ASSETS ---------------- */

function convertAssets(fullPath, text){

  imageStore = [];

  text = text.replace(/image::([^\n]+)/g,(m,raw)=>{
    const url = resolvePath(fullPath, raw.trim());
    imageStore.push(`<img src="${url}">`);
    return `@@IMG${imageStore.length-1}@@`;
  });

  text = text.replace(/mp3::(.*?)(?:::([^\n]+))?/g,(m,src,desc)=>{
    const url = resolvePath(fullPath, src.trim());

    if(kindleMode){
      return `<p>🔊 ${desc ? desc : "Audio content"}</p>`;
    }

    return `<audio controls><source src="${url}" type="audio/mpeg"></audio>`;
  });

  return text;
}

function restoreImages(){
  const el = document.getElementById("page");
  imageStore.forEach((img,i)=>{
    el.innerHTML = el.innerHTML.replaceAll(`@@IMG${i}@@`, img);
  });
}

/* ---------------- LINKS ---------------- */

function convertPageLinks(text){
  return text.replace(/\{\[([^\]]+)\]page::([^\}]+)\}/g,(m,t,p)=>{
    return `<a href="#" onclick="openWikiPath('${p}')">${t.replace(/_/g,' ')}</a>`;
  });
}

/* ---------------- UTIL ---------------- */

function resolvePath(base,file){
  if(file.startsWith("http")) return file;

  return `https://raw.githubusercontent.com/coolpython53/GENSHIN-WIKI/main/pages/${base}/${file}`;
}

/* ---------------- START ---------------- */

loadPages();

</script>

</body>
</html>
