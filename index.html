<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Static Wiki Engine</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

#layout {
  display:flex;
  height:100vh;
}

/* SIDEBAR */
#sidebar {
  width:300px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  box-sizing:border-box;
  background:#0f172a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

/* PAGE ITEM */
.page {
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  cursor:pointer;
  border-bottom:1px solid #222;
}

.page:hover {
  background:#1f2937;
}

/* ICON */
.page img {
  width:22px;
  height:22px;
  object-fit:cover;
  border-radius:4px;
}

/* CONTENT */
#content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

img {
  max-width:100%;
  margin-top:10px;
  border-radius:10px;
}

audio {
  width:100%;
  margin:10px 0;
}

/* LINKS */
a {
  color:#60a5fa;
}
</style>
</head>

<body>

<div id="layout">

  <div id="sidebar">
    <input id="search" placeholder="Search pages..." oninput="renderList()" />
    <div id="list"></div>
  </div>

  <div id="content">
    <h2 id="title">Wiki</h2>
    <div id="page">Select a page</div>
  </div>

</div>

<script>

/* ================= CONFIG ================= */
const BASE_URL = "https://coolpython53.github.io/GENSHIN-WIKI/";
const ICON_URL = BASE_URL + "blueprint.jpg";

let pages = [];

/* ================= LOAD PAGES ================= */
async function loadPages() {
  try {
    const res = await fetch(BASE_URL + "manifest.json");
    pages = await res.json();
  } catch {
    pages = [];
  }
  renderList();
}

/* ================= SIDEBAR ================= */
function renderList() {
  const q = search.value.toLowerCase();
  list.innerHTML = "";

  pages
    .filter(p => p.toLowerCase().includes(q))
    .forEach(p => {

      const div = document.createElement("div");
      div.className = "page";

      div.innerHTML = `
        <img src="${ICON_URL}" alt="icon">
        <span>${p}</span>
      `;

      div.onclick = () => loadPage(p);

      list.appendChild(div);
    });
}

/* ================= LOAD PAGE ================= */
async function loadPage(name) {

  title.innerText = name;
  page.innerHTML = "Loading...";

  const url = `${BASE_URL}pages/${encodeURIComponent(name)}/page.md`;

  try {
    const res = await fetch(url);
    let text = await res.text();

    text = convertAssets(name, text);

    page.innerHTML = marked.parse(text);

  } catch {
    page.innerHTML = "❌ Failed to load page";
  }
}

/* ================= CLEAN ================= */
function clean(str) {
  return str.replace(/\r/g, "").replace(/\n/g, "").trim();
}

/* ================= ASSETS ================= */
function convertAssets(folder, text) {

  // 🖼️ IMAGE → RAW
  text = text.replace(/image::(.*)/g, (m, src) => {

    const file = clean(src);

    const url = file.startsWith("http")
      ? file
      : `https://raw.githubusercontent.com/coolpython53/GENSHIN-WIKI/main/pages/${folder}/${file}`;

    return `![](${url})`;
  });

  // 🎵 MP3 → RAW
  text = text.replace(/mp3::(.*)/g, (m, src) => {

    const file = clean(src);

    const url = file.startsWith("http")
      ? file
      : `https://raw.githubusercontent.com/coolpython53/GENSHIN-WIKI/main/pages/${folder}/${file}`;

    return `<audio controls><source src="${url}" type="audio/mpeg"></audio>`;
  });

  return text;
}

/* ================= START ================= */
loadPages();

</script>

</body>
</html>
