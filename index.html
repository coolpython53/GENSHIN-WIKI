<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Static Wiki Engine</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

#layout {
  display:flex;
  height:100vh;
}

#sidebar {
  width:280px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

#content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  box-sizing:border-box;
  background:#0f172a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

.page {
  padding:8px;
  cursor:pointer;
  border-bottom:1px solid #222;
}

.page:hover {
  background:#1f2937;
}

img {
  max-width:100%;
  margin:10px 0;
  border-radius:10px;
}

audio {
  width:100%;
  margin:10px 0;
}
</style>
</head>

<body>

<div id="layout">

  <div id="sidebar">
    <input id="search" placeholder="Search pages..." oninput="renderList()" />
    <div id="list"></div>
  </div>

  <div id="content">
    <h2 id="title">Wiki</h2>
    <div id="page">Select a page</div>
  </div>

</div>

<script>

/* ================= CONFIG ================= */
const BASE_URL = "https://coolpython53.github.io/GENSHIN-WIKI/";

/* ================= PAGES ================= */
let pages = [];

/* ================= LOAD MANIFEST ================= */
async function loadPages() {
  try {
    const res = await fetch(BASE_URL + "manifest.json");
    pages = await res.json();
  } catch (e) {
    console.log("Manifest failed, fallback used");
    pages = [];
  }

  renderList();
}

/* ================= RENDER LIST ================= */
function renderList() {
  const q = search.value.toLowerCase();
  list.innerHTML = "";

  pages
    .filter(p => p.toLowerCase().includes(q))
    .forEach(p => {
      const div = document.createElement("div");
      div.className = "page";
      div.innerText = "📄 " + p;
      div.onclick = () => loadPage(p);
      list.appendChild(div);
    });
}

/* ================= LOAD PAGE ================= */
async function loadPage(name) {
  title.innerText = name;
  page.innerHTML = "Loading...";

  const url = `${BASE_URL}pages/${name}/page.md`;

  try {
    const res = await fetch(url);
    let text = await res.text();

    text = parseAssets(name, text);

    page.innerHTML = markdown(text);

  } catch (err) {
    page.innerHTML = "❌ Failed to load page: " + url;
    console.log(err);
  }
}

/* ================= ASSET PARSER ================= */
function parseAssets(folder, text) {

  // IMAGE
  text = text.replace(/image::(.*)/g, (m, src) => {
    const clean = src.trim();
    const url = `${BASE_URL}pages/${folder}/${clean}`;

    console.log("IMG:", url);

    return `<img src="${url}" onerror="this.style.border='3px solid red'; this.alt='FAILED IMAGE'">`;
  });

  // AUDIO
  text = text.replace(/mp3::(.*)/g, (m, src) => {
    const clean = src.trim();
    const url = `${BASE_URL}pages/${folder}/${clean}`;

    console.log("MP3:", url);

    return `
      <audio controls>
        <source src="${url}" type="audio/mpeg">
      </audio>
    `;
  });

  return text;
}

/* ================= MINI MARKDOWN ================= */
function markdown(text) {
  return text
    .replace(/^### (.*$)/gim, "<h3>$1</h3>")
    .replace(/^## (.*$)/gim, "<h2>$1</h2>")
    .replace(/^# (.*$)/gim, "<h1>$1</h1>")
    .replace(/\*\*(.*?)\*\*/gim, "<b>$1</b>")
    .replace(/\n/g, "<br>");
}

/* ================= START ================= */
loadPages();

</script>

</body>
</html>
