<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wiki Engine</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

#layout {
  display:flex;
  height:100vh;
}

#sidebar {
  width:280px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

#content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  box-sizing:border-box;
  background:#0f172a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

.page {
  padding:8px;
  cursor:pointer;
  border-bottom:1px solid #222;
}

.page:hover {
  background:#1f2937;
}

img {
  max-width:100%;
  margin:10px 0;
  border-radius:10px;
}

audio {
  width:100%;
  margin:10px 0;
}
</style>
</head>

<body>

<div id="layout">

  <div id="sidebar">
    <input id="search" placeholder="Search pages..." oninput="renderList()" />
    <div id="list"></div>
  </div>

  <div id="content">
    <h2 id="title">Select a page</h2>
    <div id="page"></div>
  </div>

</div>

<script>

let pages = [];

/* ================= LOAD MANIFEST ================= */
async function loadManifest() {
  const res = await fetch("manifest.json");
  pages = await res.json();
  renderList();
}

/* ================= RENDER LIST ================= */
function renderList() {
  const q = search.value.toLowerCase();
  list.innerHTML = "";

  pages
    .filter(p => p.toLowerCase().includes(q))
    .forEach(p => {
      const div = document.createElement("div");
      div.className = "page";
      div.innerText = "📄 " + p;
      div.onclick = () => loadPage(p);
      list.appendChild(div);
    });
}

/* ================= LOAD PAGE ================= */
async function loadPage(name) {
  title.innerText = name;
  page.innerHTML = "Loading...";

  const res = await fetch(`pages/${name}/page.md`);
  let text = await res.text();

  text = parseAssets(name, text);

  page.innerHTML = markdown(text);
}

/* ================= ASSET PARSER ================= */
function parseAssets(folder, text) {

  // IMAGE TAGS
  text = text.replace(/image::(.*)/g, (m, src) => {
    return `<img src="pages/${folder}/${src.trim()}">`;
  });

  // MP3 TAGS
  text = text.replace(/mp3::(.*)/g, (m, src) => {
    return `
      <audio controls>
        <source src="pages/${folder}/${src.trim()}" type="audio/mpeg">
      </audio>
    `;
  });

  return text;
}

/* ================= MINI MARKDOWN ================= */
function markdown(text) {
  return text
    .replace(/^### (.*$)/gim, "<h3>$1</h3>")
    .replace(/^## (.*$)/gim, "<h2>$1</h2>")
    .replace(/^# (.*$)/gim, "<h1>$1</h1>")
    .replace(/\*\*(.*?)\*\*/gim, "<b>$1</b>")
    .replace(/\n/g, "<br>");
}

/* ================= START ================= */
loadManifest();

</script>

</body>
</html>
