<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toolkit Fixed</title>

<script src="https://unpkg.com/lamejs@1.2.0/lame.min.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#0f766e);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
  color:white;
}

@keyframes bg {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.card {
  width:360px;
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:18px;
  text-align:center;
  backdrop-filter:blur(14px);
}

.file-btn {
  display:block;
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
  margin-bottom:15px;
}
.file-btn input { display:none; }

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#06b6d4);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#status { margin-top:12px; }
</style>
</head>

<body>

<div class="card">
  <h2>🎧 OGG → MP3</h2>

  <label class="file-btn">
    <span id="label">🎵 Choose file</span>
    <input type="file" id="file" accept=".ogg,audio/ogg">
  </label>

  <button onclick="convert()">Convert</button>

  <p id="status">Waiting...</p>
</div>

<script>
/* =========================
   🔥 SINGLE SOURCE OF TRUTH
========================= */
let selectedFile = null;

const fileInput = document.getElementById("file");
const label = document.getElementById("label");
const status = document.getElementById("status");

/* =========================
   📂 FILE SELECT FIX
========================= */
fileInput.addEventListener("change", (e) => {
    selectedFile = e.target.files?.[0] || null;

    if (!selectedFile) return;

    label.innerText = "🎵 " + selectedFile.name;
    status.innerText = "File loaded ✔";
});

/* =========================
   📦 DRAG & DROP SUPPORT
========================= */
document.addEventListener("dragover", e => e.preventDefault());

document.addEventListener("drop", e => {
    e.preventDefault();

    const file = e.dataTransfer.files?.[0];
    if (!file) return;

    selectedFile = file;
    fileInput.files = e.dataTransfer.files;

    label.innerText = "🎵 " + file.name;
    status.innerText = "File loaded ✔";
});

/* =========================
   🎧 CONVERT FUNCTION (FIXED)
========================= */
async function convert() {

    if (!selectedFile) {
        alert("Upload a file first!");
        return;
    }

    try {
        status.innerText = "Decoding...";

        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buffer = await ctx.decodeAudioData(await selectedFile.arrayBuffer());

        const encoder = new lamejs.Mp3Encoder(
            buffer.numberOfChannels,
            buffer.sampleRate,
            128
        );

        const left = buffer.getChannelData(0);
        const right = buffer.numberOfChannels > 1
            ? buffer.getChannelData(1)
            : left;

        let mp3Data = [];
        const block = 1152;

        for (let i = 0; i < left.length; i += block) {

            const l = left.subarray(i, i + block);
            const r = right.subarray(i, i + block);

            const l16 = Int16Array.from(l, v => v * 32767);
            const r16 = Int16Array.from(r, v => v * 32767);

            const chunk = buffer.numberOfChannels > 1
                ? encoder.encodeBuffer(l16, r16)
                : encoder.encodeBuffer(l16);

            if (chunk.length) mp3Data.push(chunk);
        }

        const end = encoder.flush();
        if (end.length) mp3Data.push(end);

        const blob = new Blob(mp3Data, { type: "audio/mp3" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = selectedFile.name.replace(/\.ogg$/i, ".mp3");
        a.click();

        URL.revokeObjectURL(url);

        status.innerText = "Done 🎉";

    } catch (e) {
        console.error(e);
        status.innerText = "Error: " + e.message;
    }
}
</script>

</body>
</html>
