<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wiki Engine</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

#layout {
  display:flex;
  height:100vh;
}

#sidebar {
  width:300px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#0f172a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

.item {
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  cursor:pointer;
  border-radius:6px;
}

.item:hover {
  background:#1f2937;
}

.icon {
  width:18px;
  height:18px;
  border-radius:4px;
}

.folder {
  font-weight:bold;
}

#content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

img { max-width:100%; border-radius:10px; }
audio { width:100%; }

a { color:#60a5fa; }
</style>
</head>

<body>

<div id="layout">
  <div id="sidebar">
    <input id="search" placeholder="Search..." />
    <div id="tree"></div>
  </div>

  <div id="content">
    <h2 id="title">Wiki</h2>
    <div id="page">Select a page</div>
  </div>
</div>

<script>

const BASE_URL = "https://coolpython53.github.io/GENSHIN-WIKI/";

let pages = [];
let expanded = new Set();

/* ---------------- PATH CLEANER ---------------- */

function normalizePath(path){
  return path
    .replace(/^pages\//,"")
    .replace(/\.md$/,"")
    .replace(/^\/+/,"")
    .replace(/\/+/g,"/");
}

/* ---------------- MARKED ---------------- */

marked.setOptions({
  breaks:true,
  gfm:true,
  headerIds:false,
  mangle:false,
  sanitize:false
});

/* ---------------- LOAD ---------------- */

async function loadPages(){
  const res = await fetch(BASE_URL + "manifest.json?t=" + Date.now());
  pages = await res.json();
  renderTree();
}

/* ---------------- TREE ---------------- */

function buildTree(paths){
  const root = {};

  paths.forEach(path=>{
    const parts = path.split("/");
    let cur = root;

    parts.forEach((p,i)=>{
      if(!cur[p]){
        cur[p] = {
          __children:{},
          __path: parts.slice(0,i+1).join("/")
        };
      }
      cur = cur[p].__children;
    });
  });

  return root;
}

/* ---------------- BLUEPRINT ---------------- */

async function getBlueprint(fullPath){
  const base = `${BASE_URL}pages/${fullPath}/blueprint`;
  const exts = ["jpg","png","webp","jpeg"];

  for(const ext of exts){
    const url = `${base}.${ext}`;
    try {
      const res = await fetch(url,{method:"HEAD"});
      if(res.ok) return url;
    } catch {}
  }
  return null;
}

/* ---------------- TREE ---------------- */

function renderTree(){
  tree.innerHTML = "";

  const q = search.value.toLowerCase();
  const filtered = pages.filter(p => p.toLowerCase().includes(q));

  const treeData = buildTree(filtered);
  renderNode(treeData, tree, 0);
}

/* ---------------- NODE ---------------- */

function renderNode(node, container, depth){
  for(const key of Object.keys(node)){
    const item = node[key];
    const fullPath = normalizePath(item.__path);
    const children = item.__children;
    const isFolder = Object.keys(children).length > 0;

    const div = document.createElement("div");
    div.className = "item";
    div.style.marginLeft = depth * 16 + "px";

    const icon = document.createElement("img");
    icon.className = "icon";

    const label = document.createElement("span");
    label.textContent = key.replace(/_/g,' ');
    if(isFolder) label.className = "folder";

    getBlueprint(fullPath).then(url=>{
      if(url) icon.src = url;
    });

    div.onclick = ()=>{
      expanded.has(fullPath)
        ? expanded.delete(fullPath)
        : expanded.add(fullPath);

      openPath(fullPath);
      renderTree();
    };

    div.appendChild(icon);
    div.appendChild(label);
    container.appendChild(div);

    if(isFolder && expanded.has(fullPath)){
      const child = document.createElement("div");
      renderNode(children, child, depth+1);
      container.appendChild(child);
    }
  }
}

/* ---------------- SINGLE SMART LOADER ---------------- */

async function openPath(fullPath){

  fullPath = normalizePath(fullPath);

  title.innerText = fullPath.split("/").pop();

  const pageUrl = `${BASE_URL}pages/${fullPath}/page.md`;
  const folderUrl = `${BASE_URL}pages/${fullPath}/folder.md`;

  try {
    let res = await fetch(pageUrl + `?t=${Date.now()}`);

    if(res.ok){
      renderPage(await res.text(), fullPath);
      return;
    }

    res = await fetch(folderUrl + `?t=${Date.now()}`);

    if(res.ok){
      renderPage(await res.text(), fullPath);
      return;
    }

    page.innerHTML = "❌ Missing page.md or folder.md";

  } catch {
    page.innerHTML = "❌ Load error";
  }
}

/* ---------------- LINKS (ONLY page:: NOW) ---------------- */

function convertLinks(text){
  return text.replace(/\{\[([^\]]+)\]page::([^\}]+)\}/g,(m,label,path)=>{
    path = normalizePath(path);
    return `<a href="#" data-page="${path}">${label}</a>`;
  });
}

/* ---------------- PAGE RENDER ---------------- */

function renderPage(text, fullPath){

  let audioMap = new Map();
  let audioIndex = 0;

  text = text.replace(/image::([^\n]+)/g,(m,input)=>{
    let [file,size] = input.split("::::");
    const url = `${BASE_URL}pages/${fullPath}/${file.trim()}`;
    return `<img src="${url}" style="${size?`width:${size}%;`:''}">`;
  });

  text = text.replace(/mp3::([^\n]+)/g,(m,input)=>{
    let [file,vol] = input.split("::::");
    const url = `${BASE_URL}pages/${fullPath}/${file.trim()}`;
    const id = "aud_" + audioIndex++;

    audioMap.set(id,{
      url,
      vol: vol?Number(vol)/100:1
    });

    return `<span id="${id}"></span>`;
  });

  text = convertLinks(text);

  page.innerHTML = marked.parse(text);

  page.querySelectorAll("a[data-page]").forEach(a=>{
    a.onclick = e=>{
      e.preventDefault();
      openPath(a.dataset.page);
    };
  });

  requestAnimationFrame(()=>{
    audioMap.forEach((data,id)=>{
      const el = document.getElementById(id);
      if(!el) return;

      const audio = document.createElement("audio");
      audio.controls = true;

      const src = document.createElement("source");
      src.src = data.url;
      src.type = "audio/mpeg";

      audio.appendChild(src);
      audio.addEventListener("loadedmetadata",()=>{
        audio.volume = data.vol;
      });

      el.replaceWith(audio);
    });
    audioMap.clear();
  });
}

/* ---------------- START ---------------- */

search.oninput = renderTree;
loadPages();

</script>

</body>
</html>
