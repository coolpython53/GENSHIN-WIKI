<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wiki Portal</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #141a33, #070a14);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    width: 420px;
    padding: 25px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }

  h2 {
    text-align: center;
    margin-bottom: 15px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
  }

  input:focus {
    box-shadow: 0 0 10px #6aa8ff;
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #6aa8ff, #a87bff);
    color: white;
    transition: 0.2s;
  }

  button:hover {
    transform: translateY(-2px);
  }

  .hidden {
    display: none;
  }

  .badge {
    display: inline-block;
    padding: 5px 10px;
    background: rgba(100,200,255,0.15);
    border-radius: 20px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="box" id="authBox">

  <h2>🌌 Wiki Portal</h2>

  <h3>Login</h3>
  <input id="login_email" placeholder="Email">
  <input id="login_pass" type="password" placeholder="Password">
  <button onclick="login()">Enter Wiki</button>

  <hr style="opacity:0.2">

  <h3>Signup</h3>
  <input id="su_user" placeholder="Username">
  <input id="su_email" placeholder="Email">
  <input id="su_pass" type="password" placeholder="Password">
  <button onclick="signup()">Create Account</button>

</div>

<div class="box hidden" id="dashboard">
  <h2>✨ Welcome, <span id="name"></span></h2>
  <div class="badge" id="role"></div>

  <button onclick="logout()">Logout</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxPCEBLslQVpHCJAJeal6ao-KuR9VRaaCyfL1FekDG9npiHBXurFzY8kgfFufzMq69yVg/exec";

/* ================= LOGIN ================= */
async function login() {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      email: document.getElementById("login_email").value,
      password: document.getElementById("login_pass").value
    })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user", JSON.stringify(data));
    showDashboard(data);
  } else {
    alert(data.message);
  }
}

/* ================= SIGNUP ================= */
async function signup() {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "signup",
      username: document.getElementById("su_user").value,
      email: document.getElementById("su_email").value,
      password: document.getElementById("su_pass").value
    })
  });

  const data = await res.json();
  alert(data.message);
}

/* ================= UI ================= */
function showDashboard(user) {
  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("name").innerText = user.username;
  document.getElementById("role").innerText = "Role: " + user.role;
}

/* ================= LOGOUT ================= */
function logout() {
  localStorage.removeItem("user");
  location.reload();
}

/* ================= AUTO LOGIN ================= */
window.onload = () => {
  const user = localStorage.getItem("user");
  if (user) showDashboard(JSON.parse(user));
};
</script>

</body>
</html>
