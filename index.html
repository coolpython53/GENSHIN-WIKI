<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Static Wiki Engine</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0b0f1a; color:white; }
#layout { display:flex; height:100vh; }
#sidebar { width:300px; background:#111827; padding:10px; overflow-y:auto; }
input { width:100%; padding:10px; margin-bottom:10px; background:#0f172a; color:white; border:1px solid #333; border-radius:6px; }
.item { display:flex; align-items:center; gap:8px; padding:6px; cursor:pointer; border-radius:6px; }
.item:hover { background:#1f2937; }
.folder { font-weight:bold; }
.indent { margin-left:16px; }
img.icon { width:18px; height:18px; border-radius:4px; }
#content { flex:1; padding:20px; overflow-y:auto; }
img { max-width:100%; border-radius:10px; }
audio { width:100%; }
a { color:#60a5fa; cursor:pointer; }
ul { padding-left:20px; }
li { margin:4px 0; cursor:pointer; }
li:hover { text-decoration:underline; }
</style>
</head>

<body>

<div id="layout">
  <div id="sidebar">
    <input id="search" placeholder="Search..." oninput="renderTree()" />
    <div id="tree"></div>
  </div>
  <div id="content">
    <h2 id="title">Wiki</h2>
    <div id="page">Select a page</div>
  </div>
</div>

<script>
const BASE_URL = "https://coolpython53.github.io/GENSHIN-WIKI/";
const FALLBACK_ICON = BASE_URL + "blueprint.jpg";
const ICON_EXTENSIONS = ["jpg","png","jpeg"];

let pages = [];

async function loadPages() {
  try {
    const res = await fetch(BASE_URL + "manifest.json?t=" + new Date().getTime());
    pages = await res.json();
  } catch {
    pages = [];
  }
  renderTree();
}

function buildTree(paths) {
  const root = {};
  paths.forEach(path => {
    const parts = path.split("/");
    let current = root;
    parts.forEach((part,i) => {
      if(!current[part]) current[part] = {__children:{}, __path: parts.slice(0,i+1).join("/")};
      current = current[part].__children;
    });
  });
  return root;
}

function renderTree() {
  const q = search.value.toLowerCase();
  tree.innerHTML = "";
  const filtered = pages.filter(p => p.toLowerCase().includes(q));
  const treeData = buildTree(filtered);
  renderNode(treeData, tree);
}

async function getBlueprintUrl(fullPath) {
  for(const ext of ICON_EXTENSIONS){
    const url = `${BASE_URL}pages/${fullPath}/blueprint.${ext}`;
    try {
      const res = await fetch(url, {method:'HEAD'});
      if(res.ok) return url;
    } catch{}
  }
  return FALLBACK_ICON;
}

function renderNode(node, container, depth=0){
  Object.keys(node).forEach(async key => {
    const item = node[key];
    const fullPath = item.__path;
    const hasChildren = Object.keys(item.__children).length > 0;

    const div = document.createElement("div");
    div.className = "item indent";
    div.style.marginLeft = depth*16 + "px";

    const iconUrl = await getBlueprintUrl(fullPath);
    div.innerHTML = `<img class="icon" src="${iconUrl}" onerror="this.src='${FALLBACK_ICON}'">
                     <span class="${hasChildren?'folder':''}">${key.replace(/_/g,' ')}</span>`;

    div.onclick = () => hasChildren ? loadFolder(fullPath) : loadPage(fullPath);

    container.appendChild(div);
  });
}

async function loadPage(fullPath){
  const name = fullPath.split("/").pop();
  title.innerText = name.replace(/_/g,' ');
  page.innerHTML = "Loading...";
  const url = `${BASE_URL}pages/${fullPath}/page.md`;

  try {
    const res = await fetch(url);
    if(res.ok){
      let text = await res.text();
      text = convertAssets(fullPath,text);
      text = convertPageLinks(text);
      page.innerHTML = marked.parse(text);
    } else {
      page.innerHTML = "📁 Folder"; 
    }
  } catch {
    page.innerHTML = "📁 Folder"; 
  }
}

async function loadFolder(fullPath){
  title.innerText = fullPath.split("/").pop().replace(/_/g,' ');
  page.innerHTML = "";

  const folderMdUrl = `${BASE_URL}pages/${fullPath}/folder.md`;
  try{
    const res = await fetch(folderMdUrl);
    if(res.ok){
      let text = await res.text();
      text = convertAssets(fullPath,text);
      text = convertPageLinks(text);
      const div = document.createElement("div");
      div.innerHTML = marked.parse(text);
      page.appendChild(div);
    }
  } catch{}

  const children = pages.filter(p=>p.startsWith(fullPath) && p !== fullPath);
  if(children.length===0){
    page.innerHTML += "<br>📁 Empty Folder";
    return;
  }

  const ul = document.createElement("ul");
  children.forEach(c=>{
    const li = document.createElement("li");
    li.innerText = c.split("/").pop().replace(/_/g,' ');
    li.onclick = ()=>loadPage(c);
    ul.appendChild(li);
  });
  page.appendChild(ul);
}

function clean(str){return str.replace(/\r/g,"").replace(/\n/g,"").trim();}

function resolvePath(basePath,file){
  if(file.startsWith("http")) return file;
  if(file.startsWith("/")) return "";

  const stack = basePath.split("/");
  file.split("/").forEach(part=>{
    if(part==="..") stack.pop();
    else if(part!==".") stack.push(part);
  });

  return `https://raw.githubusercontent.com/coolpython53/GENSHIN-WIKI/main/pages/${stack.join("/")}`;
}

function convertAssets(fullPath, text){

  // image::FULL_URL:::500,300
  // image::FULL_URL::::50
  // image::FULL_URL

  text = text.replace(/image::(.+)/g, (m, rawLine) => {

    let raw = rawLine.trim();

    let url = raw;
    let style = "";

    // ---- percent version ----
    const percentIndex = raw.indexOf("::::");
    if (percentIndex !== -1) {
      url = raw.slice(0, percentIndex).trim();
      const percent = raw.slice(percentIndex + 4).trim();

      url = resolvePath(fullPath, clean(url));
      return `<img src="${url}" style="width:${percent}%;height:auto;">`;
    }

    // ---- pixel version ----
    const sizeIndex = raw.indexOf(":::");
    if (sizeIndex !== -1) {
      url = raw.slice(0, sizeIndex).trim();
      const size = raw.slice(sizeIndex + 3).trim();

      const [w, h] = size.split(",");

      url = resolvePath(fullPath, clean(url));

      if (w) style += `width:${w}px;`;
      if (h) style += `height:${h}px;`;

      return `<img src="${url}" style="${style}">`;
    }

    // ---- normal image ----
    url = resolvePath(fullPath, clean(url));
    return `<img src="${url}">`;
  });

  text = text.replace(/mp3::(.*)/g,(m,src)=>{
    const url = resolvePath(fullPath,clean(src));
    return url ? `<audio controls><source src="${url}" type="audio/mpeg"></audio>` : "";
  });

  return text;
}

function convertPageLinks(text){
  return text.replace(/\{\[([^\]]+)\]page::([^\}]+)\}/g,(match,linkText,path)=>{
    const cleanPath = path.replace(/\/page\.md$/,'');
    return `<a onclick="loadPage('${cleanPath}')">${linkText.replace(/_/g,' ')}</a>`;
  });
}

loadPages();
</script>

</body>
</html>
