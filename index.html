<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Genshin Impact Wiki</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0b0f1a; color:white; }
#layout { display:flex; height:100vh; }

#sidebar {
  width:300px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#0f172a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

.item {
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  cursor:pointer;
  border-radius:6px;
}

.item:hover { background:#1f2937; }

.folder { font-weight:bold; }

img.icon {
  width:18px;
  height:18px;
  border-radius:4px;
}

#content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

img { max-width:100%; border-radius:10px; }
audio { width:100%; }

a { color:#60a5fa; cursor:pointer; }

li { margin:4px 0; cursor:pointer; }
li:hover { text-decoration:underline; }
</style>
</head>

<body>

<div id="layout">
  <div id="sidebar">
    <input id="search" placeholder="Search..." />
    <div id="tree"></div>
  </div>

  <div id="content">
    <h2 id="title">Wiki</h2>
    <div id="page">Select a page</div>
  </div>
</div>

<script>

const BASE_URL = "https://coolpython53.github.io/GENSHIN-WIKI/";
const FALLBACK_ICON = BASE_URL + "blueprint.jpg";

let pages = [];
let expandedFolders = new Set();
let imageStore = [];

/* ---------------- SEARCH ---------------- */

search.oninput = () => renderTree();

/* ---------------- LOAD ---------------- */

async function loadPages(){
  const res = await fetch(BASE_URL + "manifest.json?t=" + Date.now());
  pages = await res.json();
  renderTree();
}

/* ---------------- TREE ---------------- */

function buildTree(paths){
  const root = {};

  paths.forEach(path=>{
    const parts = path.split("/");
    let cur = root;

    parts.forEach((p,i)=>{
      if(!cur[p]){
        cur[p] = {
          __children:{},
          __path: parts.slice(0,i+1).join("/")
        };
      }
      cur = cur[p].__children;
    });
  });

  return root;
}

/* ---------------- SAFE URL ---------------- */

function safeUrl(path, file){
  return encodeURI(`${BASE_URL}pages/${path}/${file.trim()}`);
}

/* ---------------- ICON SYSTEM ---------------- */

const iconRegistry = new Map();

async function findIcon(path){
  if(iconRegistry.has(path)) return iconRegistry.get(path);

  const base = `${BASE_URL}pages/${path}/blueprint`;
  const exts = ["jpg","png","webp","jpeg"];

  for(const ext of exts){
    const url = `${base}.${ext}`;

    try {
      const res = await fetch(url, { method: "HEAD" });
      if(res.ok){
        iconRegistry.set(path, url);
        return url;
      }
    } catch {}
  }

  iconRegistry.set(path, FALLBACK_ICON);
  return FALLBACK_ICON;
}

/* ---------------- RENDER TREE ---------------- */

function renderTree(){
  tree.innerHTML = "";

  const q = search.value.toLowerCase();
  const filtered = pages.filter(p => p.toLowerCase().includes(q));
  const treeData = buildTree(filtered);

  renderNode(treeData, tree, 0);
}

/* ---------------- NODE ---------------- */

function renderNode(node, container, depth){
  for(const key of Object.keys(node)){
    const item = node[key];
    const fullPath = item.__path;
    const children = item.__children;
    const hasChildren = Object.keys(children).length > 0;

    const wrapper = document.createElement("div");
    const div = document.createElement("div");

    div.className = "item";
    div.style.marginLeft = depth * 16 + "px";

    const img = document.createElement("img");
    img.className = "icon";
    img.src = FALLBACK_ICON;

    findIcon(fullPath).then(url=>{
      img.src = url;
    });

    const label = document.createElement("span");
    label.className = hasChildren ? "folder" : "";
    label.textContent = key.replace(/_/g,' ');

    div.onclick = (e)=>{
      e.stopPropagation();

      if(hasChildren){
        expandedFolders.has(fullPath)
          ? expandedFolders.delete(fullPath)
          : expandedFolders.add(fullPath);

        renderTree();
      } else {
        loadPage(fullPath);
      }
    };

    div.appendChild(img);
    div.appendChild(label);
    wrapper.appendChild(div);

    if(hasChildren && expandedFolders.has(fullPath)){
      const childContainer = document.createElement("div");
      renderNode(children, childContainer, depth+1);
      wrapper.appendChild(childContainer);
    }

    container.appendChild(wrapper);
  }
}

/* ---------------- PAGE ---------------- */

async function loadPage(fullPath){
  title.innerText = fullPath.split("/").pop().replace(/_/g,' ');
  page.innerHTML = "Loading...";

  const url = `${BASE_URL}pages/${fullPath}/page.md`;
  const res = await fetch(url);

  if(!res.ok){
    page.innerHTML = "📁 Folder";
    return;
  }

  let text = await res.text();

  text = convertAssets(fullPath, text);
  text = convertLinks(text);

  page.innerHTML = marked.parse(text);
  restoreImages();
}

/* ---------------- ASSETS FIXED ---------------- */

function convertAssets(fullPath, text){
  imageStore = [];

  // IMAGE FIX
  text = text.replace(/image::([^\n]+)/g,(m,file)=>{
    const url = safeUrl(fullPath, file);

    imageStore.push(
      `<img src="${url}" onerror="this.style.display='none'">`
    );

    return `@@IMG${imageStore.length-1}@@`;
  });

  // AUDIO FIX
  text = text.replace(/mp3::([^\n]+)/g,(m,file)=>{
    const url = safeUrl(fullPath, file);

    return `
      <audio controls>
        <source src="${url}" type="audio/mpeg">
      </audio>
    `;
  });

  return text;
}

/* ---------------- RESTORE IMAGES ---------------- */

function restoreImages(){
  const el = document.getElementById("page");
  imageStore.forEach((img,i)=>{
    el.innerHTML = el.innerHTML.replaceAll(`@@IMG${i}@@`, img);
  });
}

/* ---------------- LINKS ---------------- */

function convertLinks(text){
  return text.replace(/\{\[([^\]]+)\]page::([^\}]+)\}/g,(m,t,p)=>{
    return `<a href="#" onclick="openPage('${p}')">${t.replace(/_/g,' ')}</a>`;
  });
}

function openPage(path){
  path = path.replace(/^pages\//,"").replace(/\/$/,"");
  loadPage(path);
}

/* ---------------- DEBUG SAFETY NET ---------------- */

window.onerror = (msg, src, line) => {
  console.log("❌ Error:", msg, src, line);
};

/* ---------------- START ---------------- */

loadPages();

</script>

</body>
</html>
