<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fandom-Style Wiki</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#0b0f1a;
  color:white;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:6px 0;
  box-sizing:border-box;
  background:#111827;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

button {
  padding:10px;
  margin:5px;
  background:#2563eb;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  background:#1d4ed8;
}

#loading {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.spinner {
  width:50px;
  height:50px;
  border:5px solid #333;
  border-top:5px solid #4c7dff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

#pages div {
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

#pages div:hover {
  background:#111827;
}
</style>
</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="loadingText">Loading...</div>
</div>

<div id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<div id="wiki" style="display:none; padding:10px;">

  <h2>Wiki</h2>

  <input id="search" placeholder="Search pages..." oninput="filterPages()">

  <button onclick="loadPages()">Reload</button>
  <button onclick="toggleMode()" id="modeBtn">View Mode</button>
  <button onclick="logout()">Logout</button>

  <div id="pages"></div>

  <h3 id="title"></h3>
  <textarea id="editor"></textarea>

  <button onclick="save()">Save</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxPCEBLslQVpHCJAJeal6ao-KuR9VRaaCyfL1FekDG9npiHBXurFzY8kgfFufzMq69yVg/exec";

/* ===== ELEMENTS ===== */
const loginBox = document.getElementById("loginBox");
const wiki = document.getElementById("wiki");
const pages = document.getElementById("pages");
const email = document.getElementById("email");
const password = document.getElementById("password");
const editor = document.getElementById("editor");
const title = document.getElementById("title");
const search = document.getElementById("search");

/* ===== STATE ===== */
let user = null;
let current = null;
let mode = "view";
let cache = [];

/* ===== LOADING ===== */
function showLoading(t="Loading..."){
  document.getElementById("loadingText").innerText = t;
  document.getElementById("loading").style.display = "flex";
}
function hideLoading(){
  document.getElementById("loading").style.display = "none";
}

/* ===== API ===== */
async function api(url, t="Loading..."){
  showLoading(t);
  try{
    const r = await fetch(url);
    const d = await r.json();
    hideLoading();
    return d;
  }catch(e){
    hideLoading();
    return {success:false,message:"network error"};
  }
}

/* ===== LOGIN ===== */
async function login(){
  const url = API +
    "?action=login" +
    "&email=" + encodeURIComponent(email.value) +
    "&password=" + encodeURIComponent(password.value);

  const d = await api(url,"Logging in...");

  if(d.success){
    user = d;
    localStorage.setItem("user", JSON.stringify(d));
    loginBox.style.display="none";
    wiki.style.display="block";
    loadPages();
  } else alert(d.message);
}

/* ===== SIGNUP ===== */
async function signup(){
  const url = API +
    "?action=signup" +
    "&username=user" +
    "&email=" + encodeURIComponent(email.value) +
    "&password=" + encodeURIComponent(password.value);

  alert(JSON.stringify(await api(url,"Signing up...")));
}

/* ===== LOAD ===== */
async function loadPages(){
  const d = await api(API+"?action=listPages","Loading pages...");
  cache = d.pages || [];
  render(cache);
}

function render(list){
  pages.innerHTML="";
  list.forEach(p=>{
    const div=document.createElement("div");
    div.innerText="📄 "+p.title;
    div.onclick=()=>openPage(p.id);
    pages.appendChild(div);
  });
}

/* ===== SEARCH ===== */
function filterPages(){
  const q = search.value.toLowerCase();
  render(cache.filter(p=>p.title.toLowerCase().includes(q)));
}

/* ===== OPEN ===== */
async function openPage(id){
  current=id;
  const d=await api(API+"?action=getPage&id="+id,"Opening...");
  if(!d.success)return;

  title.innerText=d.page.title;
  editor.value=d.page.content||"";
  editor.disabled = (user.role!=="admin" || mode==="view");
}

/* ===== SAVE ===== */
async function save(){
  const d=await api(
    API+
    "?action=updatePage"+
    "&id="+current+
    "&content="+encodeURIComponent(editor.value)+
    "&editor="+encodeURIComponent(user.email),
    "Saving..."
  );
  alert(d.success?"Saved!":d.message);
}

/* ===== MODE ===== */
function toggleMode(){
  if(user.role!=="admin") return alert("Admin only");

  mode = mode==="view"?"edit":"view";
  editor.disabled = (mode==="view");
  document.getElementById("modeBtn").innerText =
    mode==="edit"?"Edit Mode":"View Mode";
}

/* ===== AUTO LOGIN ===== */
window.onload=()=>{
  const s=localStorage.getItem("user");
  if(s){
    user=JSON.parse(s);
    loginBox.style.display="none";
    wiki.style.display="block";
    loadPages();
  }
};

/* ===== LOGOUT ===== */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}
</script>

</body>
</html>
