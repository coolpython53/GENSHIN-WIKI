<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wiki Engine</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

#layout {
  display:flex;
  height:100vh;
}

#sidebar {
  width:300px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#0f172a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

.item {
  padding:6px;
  cursor:pointer;
  border-radius:6px;
}

.item:hover {
  background:#1f2937;
}

.folder {
  font-weight:bold;
}

#content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

img {
  max-width:100%;
  border-radius:10px;
}

audio {
  width:100%;
}

a {
  color:#60a5fa;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="layout">
  <div id="sidebar">
    <input id="search" placeholder="Search..." />
    <div id="tree"></div>
  </div>

  <div id="content">
    <h2 id="title">Wiki</h2>
    <div id="page">Select a page</div>
  </div>
</div>

<script>

const BASE_URL = "https://coolpython53.github.io/GENSHIN-WIKI/";

let pages = [];
let expanded = new Set();

/* ---------------- MARKED SAFE HTML ---------------- */
marked.setOptions({
  breaks: true,
  gfm: true,
  headerIds: false,
  mangle: false
});

/* ---------------- LOAD PAGES ---------------- */

async function loadPages(){
  const res = await fetch(BASE_URL + "manifest.json?t=" + Date.now());
  pages = await res.json();
  renderTree();
}

/* ---------------- TREE ---------------- */

function buildTree(paths){
  const root = {};

  paths.forEach(path=>{
    const parts = path.split("/");
    let cur = root;

    parts.forEach((p,i)=>{
      if(!cur[p]){
        cur[p] = {
          __children:{},
          __path: parts.slice(0,i+1).join("/")
        };
      }
      cur = cur[p].__children;
    });
  });

  return root;
}

/* ---------------- RENDER TREE ---------------- */

function renderTree(){
  tree.innerHTML = "";

  const q = search.value.toLowerCase();
  const filtered = pages.filter(p => p.toLowerCase().includes(q));

  const treeData = buildTree(filtered);
  renderNode(treeData, tree, 0);
}

/* ---------------- NODE RENDER ---------------- */

function renderNode(node, container, depth){
  for(const key of Object.keys(node)){
    const item = node[key];
    const fullPath = item.__path;
    const children = item.__children;
    const isFolder = Object.keys(children).length > 0;

    const div = document.createElement("div");
    div.className = "item";
    div.style.marginLeft = depth * 16 + "px";

    const label = document.createElement("span");
    label.textContent = key.replace(/_/g,' ');
    if(isFolder) label.className = "folder";

    div.onclick = () => {
      if(isFolder){
        expanded.has(fullPath)
          ? expanded.delete(fullPath)
          : expanded.add(fullPath);

        renderTree();
      } else {
        loadPage(fullPath);
      }
    };

    div.appendChild(label);
    container.appendChild(div);

    if(isFolder && expanded.has(fullPath)){
      const child = document.createElement("div");
      renderNode(children, child, depth+1);
      container.appendChild(child);
    }
  }
}

/* ---------------- SAFE PATH RESOLVER ---------------- */

function resolveAsset(fullPath, file){
  file = file.trim();

  if(file.startsWith("http://") || file.startsWith("https://")){
    return file;
  }

  file = file.split("/").pop();

  return `${BASE_URL}pages/${fullPath}/${file}`;
}

/* ---------------- PAGE LOADER ---------------- */

async function loadPage(fullPath){
  title.innerText = fullPath.split("/").pop();
  page.innerHTML = "Loading...";

  const res = await fetch(`${BASE_URL}pages/${fullPath}/page.md?t=${Date.now()}`);

  if(!res.ok){
    page.innerHTML = "Not found";
    return;
  }

  let text = await res.text();

  /* IMAGE FIX */
  text = text.replace(/image::([^\n]+)/g,(m,file)=>{
    const url = resolveAsset(fullPath, file);
    return `<img src="${url}" onerror="this.style.display='none'">`;
  });

  /* AUDIO FIX */
  text = text.replace(/mp3::([^\n]+)/g,(m,file)=>{
    const url = resolveAsset(fullPath, file);
    return `
      <audio controls>
        <source src="${url}" type="audio/mpeg">
      </audio>
    `;
  });

  page.innerHTML = marked.parse(text);
}

/* ---------------- SEARCH ---------------- */

search.oninput = renderTree;

/* ---------------- START ---------------- */

loadPages();

</script>

</body>
</html>
