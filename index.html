<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Static Wiki Engine</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

#layout {
  display:flex;
  height:100vh;
}

#sidebar {
  width:300px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#0f172a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

/* TREE ITEMS */
.item {
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  cursor:pointer;
  border-radius:6px;
}

.item:hover {
  background:#1f2937;
}

.folder {
  font-weight:bold;
}

.indent {
  margin-left:16px;
}

img.icon {
  width:18px;
  height:18px;
  border-radius:4px;
}

#content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

img {
  max-width:100%;
  border-radius:10px;
}

audio {
  width:100%;
}
</style>
</head>

<body>

<div id="layout">

  <div id="sidebar">
    <input id="search" placeholder="Search..." oninput="renderTree()" />
    <div id="tree"></div>
  </div>

  <div id="content">
    <h2 id="title">Wiki</h2>
    <div id="page">Select a page</div>
  </div>

</div>

<script>
const BASE_URL = "https://coolpython53.github.io/GENSHIN-WIKI/";
const FALLBACK_ICON = BASE_URL + "blueprint.jpg";

// You can list top-level pages/folders in manifest
let pages = [];

async function loadPages() {
  try {
    const res = await fetch(BASE_URL + "manifest.json");
    pages = await res.json();
  } catch {
    pages = [];
  }
  renderTree();
}

// Build tree structure from manifest
function buildTree(paths) {
  const root = {};
  paths.forEach(path => {
    const parts = path.split("/");
    let current = root;
    parts.forEach((part, i) => {
      if (!current[part]) {
        current[part] = {
          __children: {},
          __path: parts.slice(0, i + 1).join("/")
        };
      }
      current = current[part].__children;
    });
  });
  return root;
}

// Render sidebar tree
function renderTree() {
  const q = search.value.toLowerCase();
  tree.innerHTML = "";

  const filtered = pages.filter(p => p.toLowerCase().includes(q));
  const treeData = buildTree(filtered);

  renderNode(treeData, tree);
}

function renderNode(node, container, depth = 0) {
  Object.keys(node).forEach(key => {
    const item = node[key];
    const hasChildren = Object.keys(item.__children).length > 0;
    const fullPath = item.__path;

    const div = document.createElement("div");
    div.className = "item indent";
    div.style.marginLeft = depth * 16 + "px";

    const iconUrl = `${BASE_URL}pages/${fullPath}/blueprint.jpg`;
    div.innerHTML = `<img class="icon" src="${iconUrl}" onerror="this.src='${FALLBACK_ICON}'">
                     <span class="${hasChildren ? 'folder' : ''}">${key}</span>`;

    // Folder toggle
    if (hasChildren) {
      let open = false;
      div.onclick = () => {
        open = !open;
        // Remove any children nodes below this folder first
        const siblings = Array.from(container.children);
        const start = siblings.indexOf(div) + 1;
        for (let i = start; i < siblings.length;) {
          if (parseInt(siblings[i].style.marginLeft) > depth * 16) {
            container.removeChild(siblings[i]);
          } else {
            i++;
          }
        }
        if (open) renderNode(item.__children, container, depth + 1);
      };
      // Still load page.md if it exists
      div.ondblclick = () => loadPage(fullPath);
    } else {
      div.onclick = () => loadPage(fullPath);
    }

    container.appendChild(div);
  });
}

// Load a page
async function loadPage(fullPath) {
  const name = fullPath.split("/").pop();
  title.innerText = name;
  page.innerHTML = "Loading...";

  const url = `${BASE_URL}pages/${fullPath}/page.md`;

  try {
    const res = await fetch(url);
    if (res.ok) {
      let text = await res.text();
      text = convertAssets(fullPath, text);
      page.innerHTML = marked.parse(text);
    } else {
      page.innerHTML = "📁 Folder (no page.md)";
    }
  } catch {
    page.innerHTML = "📁 Folder (no page.md)";
  }
}

// Clean strings
function clean(str) {
  return str.replace(/\r/g, "").replace(/\n/g, "").trim();
}

// Resolve paths inside pages only
function resolvePath(basePath, file) {
  if (file.startsWith("http")) return file;
  if (file.startsWith("/")) return "";
  const stack = basePath.split("/");
  file.split("/").forEach(part => {
    if (part === "..") stack.pop();
    else if (part !== ".") stack.push(part);
  });
  return `https://raw.githubusercontent.com/coolpython53/GENSHIN-WIKI/main/pages/${stack.join("/")}`;
}

// Convert image/mp3 links in markdown
function convertAssets(fullPath, text) {
  text = text.replace(/image::(.*)/g, (m, src) => {
    const url = resolvePath(fullPath, clean(src));
    return url ? `![](${url})` : "";
  });
  text = text.replace(/mp3::(.*)/g, (m, src) => {
    const url = resolvePath(fullPath, clean(src));
    return url ? `<audio controls><source src="${url}" type="audio/mpeg"></audio>` : "";
  });
  return text;
}

// Start
loadPages();

</script>

</body>
</html>
