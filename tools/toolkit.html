<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toolkit</title>

<script src="https://unpkg.com/lamejs@1.2.0/lame.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #312e81, #0f766e);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
  color: white;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  border-radius: 18px;
  padding: 30px;
  width: 360px;
  text-align: center;
}

.tabs {
  display: flex;
  margin-bottom: 20px;
}

.tabs button {
  flex: 1;
  padding: 10px;
  background: transparent;
  color: white;
  border: none;
  cursor: pointer;
}

.tabs button.active {
  border-bottom: 2px solid #22d3ee;
}

.panel { display: none; }
.panel.active { display: block; }

.file-btn {
  display: block;
  padding: 14px;
  border-radius: 14px;
  cursor: pointer;
  margin-bottom: 15px;
  background: rgba(255,255,255,0.08);
}
.file-btn input { display:none; }

button.main {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  background: linear-gradient(135deg, #22c55e, #06b6d4);
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

textarea, input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  color: black;
}

#status, #imgStatus { margin-top:10px; }
</style>
</head>

<body>

<div class="card">

<div class="tabs">
  <button class="active" onclick="switchTab('audio', this)">Audio</button>
  <button onclick="switchTab('image', this)">Image</button>
  <button onclick="switchTab('github', this)">GitHub</button>
  <button onclick="switchTab('cleaner', this)">Cleaner</button>
</div>

<!-- AUDIO -->
<div id="audio" class="panel active">

<label class="file-btn">
  <span id="fileLabel">🎵 Choose OGG</span>
  <input type="file" id="file" accept=".ogg,audio/ogg">
</label>

<button class="main" onclick="convert()">Convert to MP3</button>

<p id="status">Waiting…</p>

</div>

<!-- IMAGE -->
<div id="image" class="panel">

<label class="file-btn">
  <span id="imgLabel">🖼️ Choose WEBP</span>
  <input type="file" id="imgFile" accept="image/webp">
</label>

<button class="main" onclick="convertImage()">Convert to JPG</button>

<p id="imgStatus">Waiting…</p>

</div>

<!-- GITHUB -->
<div id="github" class="panel">

<input id="gh-input" placeholder="Paste GitHub URL">

<p>Raw URL</p>
<input id="raw-output" readonly>

<p>Pages URL</p>
<input id="pages-output" readonly>

</div>

<!-- CLEANER -->
<div id="cleaner" class="panel">

<textarea id="cleaner-input" rows="6" placeholder="Paste text..."></textarea>

<button class="main" onclick="cleanText()">Clean</button>

</div>

</div>

<script>

/* -------- TAB SWITCH -------- */
function switchTab(tab, el){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

  document.getElementById(tab).classList.add("active");
  el.classList.add("active");
}

/* -------- FILE LABELS -------- */
document.getElementById("file").onchange = e=>{
  const f = e.target.files[0];
  if (f) document.getElementById("fileLabel").innerText = "🎵 " + f.name;
};

document.getElementById("imgFile").onchange = e=>{
  const f = e.target.files[0];
  if (f) document.getElementById("imgLabel").innerText = "🖼️ " + f.name;
};

/* -------- AUDIO CONVERT -------- */
async function convert(){
  const file = document.getElementById("file").files[0];
  if (!file) return alert("pick file");

  const status = document.getElementById("status");

  try{
    status.innerText = "Decoding...";

    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = await ctx.decodeAudioData(await file.arrayBuffer());

    const mp3 = new lamejs.Mp3Encoder(buf.numberOfChannels, buf.sampleRate, 128);

    const left = buf.getChannelData(0);
    const right = buf.numberOfChannels > 1 ? buf.getChannelData(1) : left;

    let out = [];
    const block = 1152;

    for(let i=0;i<left.length;i+=block){
      const l = left.subarray(i,i+block);
      const r = right.subarray(i,i+block);

      const l16 = Int16Array.from(l.map(v=>v*32767));
      const r16 = Int16Array.from(r.map(v=>v*32767));

      const chunk = buf.numberOfChannels>1
        ? mp3.encodeBuffer(l16,r16)
        : mp3.encodeBuffer(l16);

      if(chunk.length) out.push(chunk);
    }

    const end = mp3.flush();
    if(end.length) out.push(end);

    const blob = new Blob(out,{type:"audio/mp3"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = file.name.replace(/\.ogg$/i,".mp3");
    a.click();

    URL.revokeObjectURL(url);

    status.innerText = "Done!";
  }
  catch(e){
    console.error(e);
    status.innerText = "Error: "+e.message;
  }
}

/* -------- IMAGE CONVERT -------- */
async function convertImage(){
  const file = document.getElementById("imgFile").files[0];
  if (!file) return alert("pick image");

  const status = document.getElementById("imgStatus");

  try{
    status.innerText = "Loading image...";

    const img = new Image();
    const url = URL.createObjectURL(file);

    img.onload = ()=>{
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      status.innerText = "Converting...";

      canvas.toBlob(blob=>{
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = file.name.replace(/\.webp$/i,".jpg");
        a.click();

        status.innerText = "Done!";
      }, "image/jpeg", 0.95);
    };

    img.onerror = ()=> status.innerText = "Failed to load image";

    img.src = url;
  }
  catch(e){
    console.error(e);
    status.innerText = "Error: " + e.message;
  }
}

/* -------- GITHUB TOOL -------- */
document.getElementById("gh-input").addEventListener("input", e=>{
  const raw = document.getElementById("raw-output");
  const pages = document.getElementById("pages-output");

  try{
    const url = new URL(e.target.value);
    const p = url.pathname.split("/").filter(Boolean);

    if(p[2]!=="blob") throw "bad";

    const user=p[0], repo=p[1], branch=p[3];
    const path=p.slice(4).join("/");

    raw.value=`https://raw.githubusercontent.com/${user}/${repo}/${branch}/${path}`;
    pages.value=`https://${user}.github.io/${repo}/${path}`;
  }
  catch{
    raw.value="Invalid";
    pages.value="Invalid";
  }
});

/* -------- CLEANER -------- */
function cleanText(){
  let t = document.getElementById("cleaner-input").value;

  t = t.replace(/\[(\d+|[a-z]|note\s*\d+|citation needed)\]/gi,"");
  t = t.replace(/\s{2,}/g," ");
  t = t.replace(/\s+([.,!?])/g,"$1");

  document.getElementById("cleaner-input").value = t.trim();
}

  
</script>

</body>
</html>
