<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genshin Toolkit</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

<style>
body { font-family: sans-serif; background:#f0f2f5; }
.btn { background:#4a90e2; color:white; padding:12px; border-radius:8px; }
</style>
</head>

<body class="p-6">

<h1 class="text-xl font-bold mb-4">Audio Converter</h1>

<input type="file" id="file">
<select id="format">
<option value="mp3">mp3</option>
<option value="wav">wav</option>
<option value="ogg">ogg</option>
<option value="m4a">m4a</option>
</select>

<button class="btn" onclick="convert()">Convert</button>

<p id="status"></p>
<a id="download" style="display:none">Download</a>

<script>
const createFFmpeg = FFmpeg.createFFmpeg;
const fetchFile = FFmpeg.fetchFile;

const ffmpeg = createFFmpeg({
    log: true,
    corePath: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js"
});

ffmpeg.setProgress(({ ratio }) => {
    document.getElementById("status").innerText =
        "Processing: " + Math.round(ratio * 100) + "%";
});

async function convert() {
    const fileInput = document.getElementById("file");
    const file = fileInput.files[0];
    const format = document.getElementById("format").value;

    if (!file) {
        alert("select file first");
        return;
    }

    const status = document.getElementById("status");

    try {
        status.innerText = "Loading FFmpeg...";

        if (!ffmpeg.isLoaded()) {
            await ffmpeg.load();
        }

        const inputName = file.name;
        const outputName = "output." + format;

        // clean old files
        try { ffmpeg.FS("unlink", inputName); } catch {}
        try { ffmpeg.FS("unlink", outputName); } catch {}

        status.innerText = "Converting...";

        ffmpeg.FS("writeFile", inputName, await fetchFile(file));

        await ffmpeg.run("-i", inputName, outputName);

        const data = ffmpeg.FS("readFile", outputName);

        const url = URL.createObjectURL(new Blob([data.buffer], {
            type: "audio/" + format
        }));

        const dl = document.getElementById("download");
        dl.href = url;
        dl.download = "converted." + format;
        dl.style.display = "block";

        status.innerText = "Done!";
    }
    catch (e) {
        console.error(e);
        status.innerText = "Error: check console (F12)";
    }
}
</script>

</body>
</html>
