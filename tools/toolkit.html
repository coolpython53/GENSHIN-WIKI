<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toolkit</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; }

.tab-active {
    border-bottom:3px solid #3b82f6;
    color:#3b82f6;
}

.panel { display:none; }
.panel.active { display:block; }

.drop {
    border:2px dashed #3b82f6;
    border-radius:16px;
    padding:40px;
    text-align:center;
    transition:0.3s;
    cursor:pointer;
}

.drop:hover {
    background:#1e293b;
    box-shadow:0 0 20px #3b82f6;
}

.drop.drag {
    background:#1e293b;
    box-shadow:0 0 30px #60a5fa;
}

.btn {
    background:#3b82f6;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body class="p-6">

<h1 class="text-xl mb-4">Toolkit</h1>

<!-- TABS -->
<div class="flex gap-6 mb-6 border-b">
<button id="tab-audio" onclick="switchTab('audio')" class="tab-active">Audio</button>
<button id="tab-github" onclick="switchTab('github')">GitHub</button>
<button id="tab-cleaner" onclick="switchTab('cleaner')">Cleaner</button>
</div>

<!-- AUDIO -->
<div id="audio" class="panel active">

<div id="drop" class="drop">
    <p id="fileText">Drop audio here or click</p>
    <input type="file" id="file" class="hidden">
</div>

<select id="format" class="mt-4 text-black p-2 rounded">
<option value="mp3">mp3</option>
<option value="wav">wav</option>
<option value="ogg">ogg</option>
</select>

<button class="btn mt-4" onclick="convert()">Convert</button>

<p id="status" class="mt-4 text-blue-300"></p>
<a id="download" class="btn mt-4 hidden">Download</a>

</div>

<!-- GITHUB TOOL -->
<div id="github" class="panel">

<input id="gh-input" placeholder="Paste GitHub URL"
class="w-full p-3 text-black rounded mb-4">

<p>Raw URL</p>
<input id="raw-output" class="w-full p-2 text-black mb-3">

<p>Pages URL</p>
<input id="pages-output" class="w-full p-2 text-black">

</div>

<!-- CLEANER -->
<div id="cleaner" class="panel">

<textarea id="cleaner-input"
class="w-full p-3 text-black rounded mb-4"
rows="6"
placeholder="Paste text..."></textarea>

<button class="btn" onclick="cleanText()">Clean</button>

</div>

<script>
/* -------- TAB SWITCH -------- */
function switchTab(tab){
    ["audio","github","cleaner"].forEach(t=>{
        document.getElementById(t).classList.remove("active");
        document.getElementById("tab-"+t).classList.remove("tab-active");
    });
    document.getElementById(tab).classList.add("active");
    document.getElementById("tab-"+tab).classList.add("tab-active");
}

/* -------- DRAG DROP -------- */
const drop = document.getElementById("drop");
const fileInput = document.getElementById("file");
const fileText = document.getElementById("fileText");

let selectedFile = null;

drop.onclick = () => fileInput.click();

fileInput.onchange = e => {
    selectedFile = e.target.files[0];
    fileText.innerText = selectedFile.name;
};

drop.ondragover = e => {
    e.preventDefault();
    drop.classList.add("drag");
};

drop.ondragleave = () => drop.classList.remove("drag");

drop.ondrop = e => {
    e.preventDefault();
    drop.classList.remove("drag");

    selectedFile = e.dataTransfer.files[0];
    fileText.innerText = selectedFile.name;
};

/* -------- FFmpeg -------- */
const createFFmpeg = FFmpeg.createFFmpeg;
const fetchFile = FFmpeg.fetchFile;

const ffmpeg = createFFmpeg({
    log:true,
    corePath:"https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js"
});

async function convert() {
    if (!selectedFile) return alert("pick file");

    const status = document.getElementById("status");

    try {
        status.innerText = "Loading...";

        if (!ffmpeg.isLoaded()) await ffmpeg.load();

        const input = selectedFile.name;
        const output = "out." + document.getElementById("format").value;

        ffmpeg.FS("writeFile", input, await fetchFile(selectedFile));

        status.innerText = "Converting...";

        await ffmpeg.run("-i", input, output);

        const data = ffmpeg.FS("readFile", output);

        const url = URL.createObjectURL(new Blob([data.buffer]));

        const dl = document.getElementById("download");
        dl.href = url;
        dl.download = output;
        dl.classList.remove("hidden");

        status.innerText = "Done!";
    }
    catch (e) {
        console.error(e);
        status.innerText = "ERROR: " + e.message;
    }
}

/* -------- GITHUB TOOL -------- */
function cleanEncode(s){
    try { return encodeURIComponent(decodeURIComponent(s)); }
    catch { return encodeURIComponent(s); }
}

document.getElementById("gh-input").addEventListener("input", e=>{
    const raw = document.getElementById("raw-output");
    const pages = document.getElementById("pages-output");

    try {
        const url = new URL(e.target.value);
        const p = url.pathname.split("/").filter(Boolean);

        if (p[2] !== "blob") throw "bad";

        const user = p[0];
        const repo = p[1];
        const branch = p[3];
        const path = p.slice(4).map(cleanEncode).join("/");

        raw.value = `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${path}`;
        pages.value = `https://${user}.github.io/${repo}/${path}`;
    }
    catch {
        raw.value = "Invalid URL";
        pages.value = "Invalid URL";
    }
});

/* -------- CLEANER -------- */
function cleanText(){
    const el = document.getElementById("cleaner-input");
    let text = el.value;

    text = text.replace(/\[(\d+|[a-z]|note\s*\d+|citation needed)\]/gi,"");
    text = text.replace(/\s{2,}/g," ");
    text = text.replace(/\s+([.,!?])/g,"$1");

    el.value = text.trim();
}
</script>

</body>
</html>
